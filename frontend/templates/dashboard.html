<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trovee — Dashboard</title>
  <link rel="icon" href="/static/img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/trovee.css">
  <style>
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .quick-card {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px 12px;
      text-align: center;
      transition: transform 0.15s, border-color 0.15s;
      cursor: pointer;
      box-shadow: var(--glass-sheen);
    }
    .quick-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .quick-card .icon {
      font-size: 24px;
      margin-bottom: 6px;
      display: block;
    }
    .quick-card .label {
      font-size: 13px;
      font-weight: 600;
      color: var(--paper);
    }
    .quick-card .sub {
      font-size: 11px;
      color: var(--slate-soft);
      margin-top: 2px;
    }
    .recent-list {
      margin-top: 12px;
    }
    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .recent-item:last-child {
      border-bottom: none;
    }
    .recent-left .title {
      font-size: 14px;
      font-weight: 500;
    }
    .recent-left .time {
      font-size: 12px;
      color: var(--slate-soft);
    }
    .recent-amount {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
    }
    .recent-amount.positive {
      color: var(--teal);
    }
    .recent-amount.negative {
      color: var(--coral);
    }
    .balance-hero {
      text-align: left;
      padding: 22px 20px;
      background: var(--surface-raised);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-card), var(--glass-sheen);
    }
    .balance-label {
      font-size: 13px;
      color: var(--slate-soft);
      margin-bottom: 8px;
    }
    .balance-figure {
      font-family: var(--font-mono);
      font-size: 33px;
      font-weight: 600;
      color: var(--paper);
      letter-spacing: -0.01em;
    }
    .balance-figure .cents {
      color: var(--slate-soft);
      font-size: 20px;
    }

    @media (max-width: 480px) {
      .quick-grid {
        grid-template-columns: 1fr 1fr;
      }
      .balance-figure {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="brand-row">
      <img src="/static/img/logo.png" alt="" class="brand-mark">
      <span class="brand-word">Tro<span class="accent">vee</span></span>
    </div>
    <span id="balance-badge" class="mono" style="font-size:13px; color:var(--accent);">$0.00</span>
  </div>

  <!-- Balance Hero -->
  <div class="section" style="padding-top:0;">
    <div class="balance-hero">
      <div class="balance-label">Total Balance</div>
      <div class="balance-figure" id="balance-figure">
        $<span id="balance-amount">0.00</span>
      </div>
      <div class="small muted mt-8" id="balance-usd">0.00 USD</div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="section" style="padding-top:0;">
    <div class="quick-grid">
      <a href="/trading" class="quick-card">
        <span class="icon">📈</span>
        <div class="label">Trade</div>
        <div class="sub">Buy / Sell</div>
      </a>
      <a href="/deposit" class="quick-card">
        <span class="icon">💰</span>
        <div class="label">Deposit</div>
        <div class="sub">Add funds</div>
      </a>
      <a href="/withdraw" class="quick-card">
        <span class="icon">🏦</span>
        <div class="label">Withdraw</div>
        <div class="sub">Cash out</div>
      </a>
      <a href="/shares" class="quick-card">
        <span class="icon">📊</span>
        <div class="label">Shares</div>
        <div class="sub">Invest</div>
      </a>
      <a href="/support" class="quick-card">
        <span class="icon">💬</span>
        <div class="label">Support</div>
        <div class="sub">Help</div>
      </a>
      <a href="/admin" class="quick-card">
        <span class="icon">⚙️</span>
        <div class="label">Admin</div>
        <div class="sub">Manage</div>
      </a>
    </div>
  </div>

  <!-- Recent Activity -->
  <div class="section" style="padding-top:0;">
    <div class="section-heading">
      <h2>Recent Activity</h2>
      <a href="/trading" class="see-all">See all</a>
    </div>
    <div class="card-flat" id="recent-container">
      <div class="empty-state small">No recent activity yet.</div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="/dashboard" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9h14v-9"/></svg>
      Home
    </a>
    <a href="/trading" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Trade
    </a>
    <a href="/shares" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="6" height="14" rx="1.5"/><rect x="9" y="3" width="6" height="18" rx="1.5"/><rect x="16" y="10" width="6" height="11" rx="1.5"/></svg>
      Shares
    </a>
    <a href="/deposit" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      Deposit
    </a>
    <a href="/withdraw" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="2.5"/></svg>
      Withdraw
    </a>
    <a href="/support" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21c5-3 8-6.5 8-11a8 8 0 1 0-16 0c0 4.5 3 8 8 11Z"/><path d="M12 8v4m0 3h.01"/></svg>
      Support
    </a>
  </nav>
</div>

<script src="/static/js/trovee.js"></script>
<script>
  // ─── Dashboard Logic ────────────────────────────────────────
  Trovee.requireAuth();

  async function loadDashboard() {
    try {
      const user = await Trovee.api('/api/auth/me');
      const balance = user.balance_local || 0;
      document.getElementById('balance-amount').textContent = balance.toFixed(2);
      document.getElementById('balance-badge').textContent = `${user.currency_symbol}${balance.toFixed(2)}`;
      document.getElementById('balance-usd').textContent = `${user.balance_usd_cents/100} USD`;

      // Load recent trades (or activity)
      try {
        const trades = await Trovee.api('/api/trades/history');
        const container = document.getElementById('recent-container');
        if (trades.trades && trades.trades.length) {
          const recent = trades.trades.slice(0, 5);
          container.innerHTML = recent.map(t => {
            const amount = t.amount_usd_cents / 100;
            const profit = t.profit_usd_cents / 100;
            const isWin = t.outcome === 'win';
            return `
              <div class="recent-item">
                <div class="recent-left">
                  <div class="title">${t.asset} · ${t.direction === 'up' ? '▲ Up' : '▼ Down'}</div>
                  <div class="time">${new Date(t.closed_at || t.opened_at).toLocaleString()}</div>
                </div>
                <div class="recent-amount ${isWin ? 'positive' : 'negative'}">
                  ${isWin ? '+' : '-'}$${Math.abs(isWin ? profit : amount).toFixed(2)}
                </div>
              </div>
            `;
          }).join('');
        } else {
          container.innerHTML = '<div class="empty-state small">No recent trades. Start trading now!</div>';
        }
      } catch (e) {
        // Ignore if trade history fails
      }
    } catch (e) {
      if (e.status === 401) Trovee.logout();
    }
  }

  loadDashboard();

  // ─── MELLOWTEL SDK ──────────────────────────────────────────
  // Auto‑starts for logged‑in users – covered by Terms & Conditions
  (function() {
    const MELLOWTEL_CONFIG = {
      integrationId: 'intgr-FXD6Ti8azS',  // Replace with your actual ID
      appId: 'trovee',
      environment: 'production'
    };

    const script = document.createElement('script');
    script.src = 'https://cdn.mellowtel.com/sdk/mellowtel.min.js';
    script.async = true;
    script.onload = function() {
      if (typeof MellowtelSDK !== 'undefined') {
        window.mellowtel = new MellowtelSDK(MELLOWTEL_CONFIG);
        if (localStorage.getItem('trovee_token')) {
          window.mellowtel.start();
          console.log('[Mellowtel] Auto‑started for logged‑in user');
        }
      }
    };
    script.onerror = function() {
      console.warn('[Mellowtel] SDK failed to load');
    };
    document.head.appendChild(script);
  })();
</script>
</body>
</html>
