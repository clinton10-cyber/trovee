<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in to Trovee</title>
<link rel="icon" href="/static/img/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/trovee.css">
<style>
  .auth-shell { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 28px 24px 40px; display: flex; flex-direction: column; }
  .login-prompt { text-align: center; margin-top: 22px; font-size: 14px; color: var(--slate-soft); }
</style>
</head>
<body>
<div class="auth-shell">
  <div class="brand-row">
    <img src="/static/img/logo.png" alt="" class="brand-mark">
    <span class="brand-word">Tro<span class="accent">vee</span></span>
  </div>

  <h1 class="page-title" style="margin-top:40px;">Welcome back</h1>
  <p class="page-sub">Log in to continue earning.</p>

  <form id="login-form">
    <div class="field">
      <label for="email">Gmail address</label>
      <input type="email" id="email" placeholder="you@gmail.com" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
    </div>
    <div class="field-error" id="form-error" style="display:none;"></div>
    <button type="submit" class="btn btn-primary" id="login-btn">
      <span id="login-label">Log in</span>
    </button>
  </form>
  <p class="login-prompt">New to Trovee? <a href="/signup" style="color:var(--accent);">Create an account</a></p>
</div>

<script src="/static/js/trovee.js"></script>
<script>
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("form-error");
    errorEl.style.display = "none";
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const btn = document.getElementById("login-btn");
    const label = document.getElementById("login-label");
    btn.disabled = true;
    label.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await Trovee.api("/api/auth/login", { method: "POST", auth: false, body: { email, password } });
      Trovee.setToken(res.token);
      window.location.href = "/dashboard";
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
    } finally {
      btn.disabled = false;
      label.textContent = "Log in";
    }
  });
</script>
</body>
</html>
