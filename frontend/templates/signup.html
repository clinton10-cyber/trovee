<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create your Trovee account</title>
<link rel="icon" href="/static/img/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/trovee.css">
<style>
  .auth-shell { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 28px 24px 40px; display: flex; flex-direction: column; }
  .step-indicator { display: flex; gap: 6px; margin: 24px 0 8px; }
  .step-dot { flex: 1; height: 3px; border-radius: 999px; background: var(--line-strong); }
  .step-dot.active { background: var(--accent); }
  .otp-inputs { display: flex; gap: 8px; justify-content: space-between; margin-bottom: 8px; }
  .otp-box { width: 46px; height: 54px; text-align: center; font-family: var(--font-mono); font-size: 22px; background: var(--ink-soft); border: 1px solid var(--line-strong); border-radius: var(--radius-sm); color: var(--paper); }
  .otp-box:focus { border-color: var(--accent); }
  .countdown { font-family: var(--font-mono); color: var(--slate-soft); font-size: 13px; text-align: center; margin: 14px 0; }
  .resend-link { text-align: center; font-size: 13.5px; color: var(--accent); cursor: pointer; margin-top: 6px; }
  .resend-link.disabled { color: var(--slate); cursor: default; }
  .step { display: none; }
  .step.active { display: block; }
  .login-prompt { text-align: center; margin-top: 22px; font-size: 14px; color: var(--slate-soft); }
</style>
</head>
<body>
<div class="auth-shell">
  <div class="brand-row">
    <img src="/static/img/logo.png" alt="" class="brand-mark">
    <span class="brand-word">Tro<span class="accent">vee</span></span>
  </div>

  <div class="step-indicator">
    <div class="step-dot active" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
  </div>

  <!-- Step 1: account details -->
  <div class="step active" id="step-1">
    <h1 class="page-title" style="margin-top:18px;">Create your account</h1>
    <p class="page-sub">It takes about a minute.</p>

    <form id="signup-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="yourname" autocomplete="username" required>
        <div class="field-hint">3-20 characters: letters, numbers, underscores.</div>
      </div>
      <div class="field">
        <label for="email">Gmail address</label>
        <input type="email" id="email" placeholder="you@gmail.com" autocomplete="email" required>
        <div class="field-hint">We send a one-time code to this address to verify it's yours.</div>
      </div>
      <div class="field">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" placeholder="+1 555 000 0000" autocomplete="tel" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required>
      </div>
      <div class="field-error" id="form-error" style="display:none;"></div>
      <button type="submit" class="btn btn-primary" id="submit-btn">
        <span id="submit-label">Send verification code</span>
      </button>
    </form>
    <p class="login-prompt">Already have an account? <a href="/login" style="color:var(--accent);">Log in</a></p>
  </div>

  <!-- Step 2: OTP verification -->
  <div class="step" id="step-2">
    <h1 class="page-title" style="margin-top:18px;">Check your Gmail</h1>
    <p class="page-sub">Enter the 6-digit code we sent to <strong id="otp-email-display" style="color:var(--paper);"></strong></p>

    <div class="otp-inputs" id="otp-inputs">
      <input class="otp-box" maxlength="1" inputmode="numeric" data-idx="0">
      <input class="otp-box" maxlength="1" inputmode="numeric" data-idx="1">
      <input class="otp-box" maxlength="1" inputmode="numeric" data-idx="2">
      <input class="otp-box" maxlength="1" inputmode="numeric" data-idx="3">
      <input class="otp-box" maxlength="1" inputmode="numeric" data-idx="4">
      <input class="otp-box" maxlength="1" inputmode="numeric" data-idx="5">
    </div>
    <div class="field-error" id="otp-error" style="display:none;"></div>
    <div class="countdown" id="countdown">Code expires in 5:00</div>

    <button class="btn btn-primary" id="verify-btn">
      <span id="verify-label">Verify and create account</span>
    </button>
    <p class="resend-link" id="resend-link">Resend code</p>
  </div>
</div>

<script src="/static/js/trovee.js"></script>
<script>
  let pendingSignup = null;
  let countdownTimer = null;

  function showStep(n) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById(`step-${n}`).classList.add("active");
    document.getElementById("dot-1").classList.toggle("active", n >= 1);
    document.getElementById("dot-2").classList.toggle("active", n >= 2);
  }

  function setLoading(btnId, labelId, loading, text) {
    const btn = document.getElementById(btnId);
    const label = document.getElementById(labelId);
    btn.disabled = loading;
    label.innerHTML = loading ? '<span class="spinner"></span>' : text;
  }

  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("form-error");
    errorEl.style.display = "none";

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;

    setLoading("submit-btn", "submit-label", true);
    try {
      const geo = await Trovee.detectGeo();
      const res = await Trovee.api("/api/auth/signup/start", {
        method: "POST",
        auth: false,
        body: { username, email, phone, password, country_code: geo.country_code },
      });
      pendingSignup = { email };
      document.getElementById("otp-email-display").textContent = email;
      showStep(2);
      startCountdown(res.expires_in_seconds || 300);
      document.querySelector(".otp-box").focus();
      if (!res.email_sent) {
        Trovee.showToast("Email delivery isn't configured on this server yet — check server logs for the code.", "error");
      }
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
    } finally {
      setLoading("submit-btn", "submit-label", false, "Send verification code");
    }
  });

  // OTP box behavior: auto-advance, backspace, paste
  const otpInputs = document.querySelectorAll(".otp-box");
  otpInputs.forEach((box, i) => {
    box.addEventListener("input", () => {
      box.value = box.value.replace(/[^0-9]/g, "");
      if (box.value && i < otpInputs.length - 1) otpInputs[i + 1].focus();
    });
    box.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && !box.value && i > 0) otpInputs[i - 1].focus();
    });
    box.addEventListener("paste", (e) => {
      e.preventDefault();
      const text = (e.clipboardData.getData("text") || "").replace(/[^0-9]/g, "").slice(0, 6);
      text.split("").forEach((ch, idx) => { if (otpInputs[idx]) otpInputs[idx].value = ch; });
      if (text.length) otpInputs[Math.min(text.length, otpInputs.length) - 1].focus();
    });
  });

  function getOtpValue() {
    return Array.from(otpInputs).map(b => b.value).join("");
  }

  function startCountdown(seconds) {
    clearInterval(countdownTimer);
    let remaining = seconds;
    const el = document.getElementById("countdown");
    const resend = document.getElementById("resend-link");
    resend.classList.add("disabled");
    countdownTimer = setInterval(() => {
      remaining--;
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      el.textContent = remaining > 0
        ? `Code expires in ${m}:${s.toString().padStart(2, "0")}`
        : "Code expired";
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        resend.classList.remove("disabled");
      }
    }, 1000);
  }

  document.getElementById("verify-btn").addEventListener("click", async () => {
    const errorEl = document.getElementById("otp-error");
    errorEl.style.display = "none";
    const code = getOtpValue();
    if (code.length !== 6) {
      errorEl.textContent = "Enter all 6 digits.";
      errorEl.style.display = "block";
      return;
    }
    setLoading("verify-btn", "verify-label", true);
    try {
      const res = await Trovee.api("/api/auth/signup/verify", {
        method: "POST",
        auth: false,
        body: { email: pendingSignup.email, code },
      });
      Trovee.setToken(res.token);
      Trovee.showToast("Account created.");
      window.location.href = "/dashboard";
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
      otpInputs.forEach(b => b.value = "");
      otpInputs[0].focus();
    } finally {
      setLoading("verify-btn", "verify-label", false, "Verify and create account");
    }
  });

  document.getElementById("resend-link").addEventListener("click", async () => {
    if (document.getElementById("resend-link").classList.contains("disabled")) return;
    document.getElementById("signup-form").requestSubmit();
    showStep(1);
  });
</script>
</body>
</html>
